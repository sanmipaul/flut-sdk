name: Scheduled Health Check

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    name: Verify published package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify published package installs correctly
        run: |
          mkdir -p /tmp/verify-install
          cd /tmp/verify-install
          npm init -y
          npm install flut-sdk
          node -e "const sdk = require('flut-sdk'); console.log('flut-sdk exports:', Object.keys(sdk).join(', '))"
